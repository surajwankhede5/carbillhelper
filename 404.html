<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060608">
<title>404 — GarageGPT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#060608;color:#F2F2F5;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,166,35,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.container{position:relative;z-index:1;max-width:480px;}
.emoji{font-size:80px;margin-bottom:20px;display:block;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
h1{font-family:'Orbitron',monospace;font-size:80px;font-weight:900;color:#F5A623;line-height:1;margin-bottom:8px;}
h2{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:#fff;margin-bottom:14px;}
p{font-size:14px;color:#9A9AB0;line-height:1.65;margin-bottom:28px;}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:700;text-decoration:none;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.btn-gold{background:linear-gradient(135deg,#F5A623,#FFD700);color:#000;}
.btn-gold:hover{transform:translateY(-2px);}
.btn-outline{background:#141420;border:1px solid rgba(255,255,255,0.08);color:#9A9AB0;}
.btn-outline:hover{border-color:rgba(245,166,35,0.3);color:#F5A623;}
</style>
</head>
<body>
<div class="container">
  <span class="emoji">⛽</span>
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>Ye page exist nahi karta. Shayad link purana ho gaya. App pe wapas jao aur apni vehicle track karo!</p>
  <div class="btns">
    <a class="btn btn-gold" href="/garagegpt/">🏠 Go Home</a>
    <a class="btn btn-outline" href="/garagegpt/app.html">🚀 Open App</a>
  </div>
</div>
</body>
</html>
